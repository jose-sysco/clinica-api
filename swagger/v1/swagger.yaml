---
openapi: 3.0.1
info:
  title: Clínica API
  version: v1
  description: API para sistema de gestión de citas médicas multitenant
servers:
- url: http://localhost:3000
  description: Servidor de desarrollo
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- bearer_auth: []
paths:
  "/api/v1/appointments":
    get:
      summary: Lista de citas
      tags:
      - Appointments
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
      - name: doctor_id
        in: query
        required: false
        schema:
          type: integer
      - name: patient_id
        in: query
        required: false
        schema:
          type: integer
      - name: status
        in: query
        required: false
        enum:
        - pending
        - confirmed
        - in_progress
        - completed
        - cancelled
        - no_show
        schema:
          type: string
        description: ":\n * `pending` \n * `confirmed` \n * `in_progress` \n * `completed`
          \n * `cancelled` \n * `no_show` \n "
      - name: appointment_type
        in: query
        required: false
        enum:
        - first_visit
        - follow_up
        - emergency
        - routine
        schema:
          type: string
      - name: date
        in: query
        required: false
        description: Formato YYYY-MM-DD
        schema:
          type: string
      - name: from
        in: query
        required: false
        description: Formato YYYY-MM-DD
        schema:
          type: string
      - name: to
        in: query
        required: false
        description: Formato YYYY-MM-DD
        schema:
          type: string
      - name: today
        in: query
        required: false
        schema:
          type: boolean
      - name: upcoming
        in: query
        required: false
        schema:
          type: boolean
      - name: past
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Lista de citas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    type: object
    post:
      summary: Crear cita
      tags:
      - Appointments
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Cita creada
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                appointment:
                  type: object
                  properties:
                    doctor_id:
                      type: integer
                      example: 1
                    patient_id:
                      type: integer
                      example: 1
                    owner_id:
                      type: integer
                      example: 1
                    scheduled_at:
                      type: string
                      example: '2026-03-16T09:00:00'
                    appointment_type:
                      type: string
                      example: first_visit
                    reason:
                      type: string
                      example: Revisión general
                  required:
                  - doctor_id
                  - patient_id
                  - owner_id
                  - scheduled_at
                  - appointment_type
                  - reason
  "/api/v1/appointments/{id}/confirm":
    patch:
      summary: Confirmar cita
      tags:
      - Appointments
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Cita confirmada
  "/api/v1/appointments/{id}/cancel":
    patch:
      summary: Cancelar cita
      tags:
      - Appointments
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Cita cancelada
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cancelled_by:
                  type: string
                  example: cancelled_by_patient
                cancellation_reason:
                  type: string
                  example: No puedo asistir
  "/api/v1/auth/sign_up":
    post:
      summary: Registro de organización y usuario admin
      tags:
      - Auth
      security: []
      parameters: []
      responses:
        '201':
          description: Registro exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  organization:
                    type: object
                  user:
                    type: object
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                organization:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Clínica Patitas
                    subdomain:
                      type: string
                      example: patitas
                    email:
                      type: string
                      example: contacto@patitas.com
                    phone:
                      type: string
                      example: '55551234'
                    city:
                      type: string
                      example: Guatemala
                    country:
                      type: string
                      example: Guatemala
                    timezone:
                      type: string
                      example: America/Guatemala
                    clinic_type:
                      type: string
                      example: veterinary
                      enum:
                      - veterinary
                      - pediatric
                      - general
                      - dental
                  required:
                  - name
                  - subdomain
                  - email
                  - clinic_type
                user:
                  type: object
                  properties:
                    first_name:
                      type: string
                      example: Carlos
                    last_name:
                      type: string
                      example: López
                    email:
                      type: string
                      example: carlos@patitas.com
                    phone:
                      type: string
                      example: '55559999'
                    password:
                      type: string
                      example: password123
                    password_confirmation:
                      type: string
                      example: password123
                  required:
                  - first_name
                  - last_name
                  - email
                  - password
                  - password_confirmation
  "/api/v1/auth/sign_in":
    post:
      summary: Iniciar sesión
      tags:
      - Auth
      security: []
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        description: Slug de la organización
        schema:
          type: string
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    type: object
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: carlos@patitas.com
                    password:
                      type: string
                      example: password123
                  required:
                  - email
                  - password
  "/api/v1/auth/sign_out":
    delete:
      summary: Cerrar sesión
      tags:
      - Auth
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer TOKEN
        schema:
          type: string
      responses:
        '200':
          description: Sesión cerrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  "/api/v1/doctors":
    get:
      summary: Lista de doctores
      tags:
      - Doctors
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: Lista de doctores
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    type: object
  "/api/v1/doctors/{id}/availability":
    get:
      summary: Disponibilidad del doctor
      tags:
      - Doctors
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: date
        in: query
        required: true
        description: Formato YYYY-MM-DD
        schema:
          type: string
      responses:
        '200':
          description: Slots disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  doctor:
                    type: object
                  date:
                    type: string
                  day:
                    type: string
                  slots:
                    type: array
                    items:
                      type: object
                  total_available:
                    type: integer
        '400':
          description: Parámetro date requerido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/owners":
    get:
      summary: Lista de propietarios
      tags:
      - Owners
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
      - name: q
        in: query
        required: false
        description: Búsqueda por nombre, email o teléfono
        schema:
          type: string
      responses:
        '200':
          description: Lista de propietarios
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    type: object
    post:
      summary: Crear propietario
      tags:
      - Owners
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Propietario creado
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                owner:
                  type: object
                  properties:
                    first_name:
                      type: string
                      example: Juan
                    last_name:
                      type: string
                      example: Pérez
                    email:
                      type: string
                      example: juan@email.com
                    phone:
                      type: string
                      example: '55551111'
                    address:
                      type: string
                      example: Zona 10, Guatemala
                    identification:
                      type: string
                      example: '1234567'
                  required:
                  - first_name
                  - last_name
                  - phone
  "/api/v1/owners/{id}/patients":
    get:
      summary: Lista de pacientes del propietario
      tags:
      - Patients
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: Lista de pacientes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    type: object
    post:
      summary: Crear paciente
      tags:
      - Patients
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '201':
          description: Paciente creado
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                patient:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Firulais
                    patient_type:
                      type: string
                      example: animal
                      enum:
                      - human
                      - animal
                    species:
                      type: string
                      example: Perro
                    breed:
                      type: string
                      example: Labrador
                    gender:
                      type: string
                      example: male
                      enum:
                      - unknown
                      - male
                      - female
                    birthdate:
                      type: string
                      example: '2020-01-01'
                    weight:
                      type: number
                      example: 25.5
                    notes:
                      type: string
                      example: Alérgico a la penicilina
                  required:
                  - name
                  - patient_type
                  - gender
  "/api/v1/me":
    get:
      summary: Perfil del usuario actual
      tags:
      - Users
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Perfil del usuario
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  email:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    type: string
                  full_name:
                    type: string
                  phone:
                    type: string
                  role:
                    type: string
                  status:
                    type: string
                  avatar:
                    type: string
                    nullable: true
                  organization:
                    type: object
                  created_at:
                    type: string
    patch:
      summary: Actualizar perfil
      tags:
      - Users
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Perfil actualizado
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    first_name:
                      type: string
                      example: Carlos
                    last_name:
                      type: string
                      example: López
                    phone:
                      type: string
                      example: '55559999'
                    avatar:
                      type: string
                      example: https://...
  "/api/v1/me/change_password":
    patch:
      summary: Cambiar contraseña
      tags:
      - Users
      parameters:
      - name: X-Organization-Slug
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Contraseña actualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '422':
          description: Contraseña incorrecta
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  example: password123
                password:
                  type: string
                  example: newpassword456
                password_confirmation:
                  type: string
                  example: newpassword456
              required:
              - current_password
              - password
              - password_confirmation
